<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مود بورد زفاف - الأميرة نورة بنت مساعد</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red-deep: #8B1A1A;
            --red-wine: #A52A2A;
            --red-rose: #C71585;
            --peach-light: #FFDAB9;
            --peach-soft: #FFCBA4;
            --peach-warm: #FFA07A;
            --peach-coral: #F08080;
            --gold: #D4AF37;
            --gold-light: #F4E4BA;
            --cream: #FFF8F0;
            --ivory: #FFFFF0;
            --text-dark: #3D1F1F;
            --text-light: #FFF5EE;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--ivory) 30%, var(--peach-light) 70%, var(--peach-soft) 100%);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Decorative particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(120deg); }
            66% { transform: translateY(15px) rotate(240deg); }
        }

        /* Header */
        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(180deg, rgba(139,26,26,0.08) 0%, transparent 100%);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .header-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .header h1 {
            font-family: 'Amiri', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 700;
            color: var(--red-deep);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(139,26,26,0.1);
            letter-spacing: 1px;
        }

        .header-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: var(--red-wine);
            font-weight: 500;
            margin-bottom: 15px;
        }

        .header-details {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--peach-soft);
            backdrop-filter: blur(5px);
            font-size: 0.95rem;
            color: var(--red-wine);
            font-weight: 500;
        }

        .detail-icon {
            font-size: 1.2rem;
        }

        /* Color Palette Section */
        .palette-section {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .palette-title {
            text-align: center;
            font-size: 1.1rem;
            color: var(--red-deep);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .palette-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15), inset 0 0 20px rgba(255,255,255,0.3);
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .color-swatch:hover {
            transform: scale(1.15) translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.4);
        }

        .color-swatch .color-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            white-space: nowrap;
            color: var(--text-dark);
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .color-swatch:hover .color-label {
            opacity: 1;
        }

        /* Gallery */
        .gallery-section {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .gallery-title {
            text-align: center;
            font-size: 1.5rem;
            color: var(--red-deep);
            margin-bottom: 30px;
            font-weight: 700;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            padding: 0 30px;
        }

        .gallery-title::before,
        .gallery-title::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 1rem;
        }

        .gallery-title::before { left: 0; }
        .gallery-title::after { right: 0; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(139,26,26,0.12);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
            cursor: pointer;
            background: white;
            aspect-ratio: 4/3;
        }

        .gallery-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(139,26,26,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .gallery-item .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(139,26,26,0.6) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay-text {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        /* Featured item (larger) */
        .gallery-item.featured {
            grid-column: span 2;
            grid-row: span 2;
            aspect-ratio: auto;
        }

        @media (max-width: 768px) {
            .gallery-item.featured {
                grid-column: span 1;
                grid-row: span 1;
            }
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(20, 5, 5, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .lightbox.active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .lightbox-close:hover {
            background: var(--red-deep);
            border-color: var(--red-deep);
            transform: rotate(90deg);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .lightbox-nav:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--text-dark);
        }

        .lightbox-prev { left: 25px; }
        .lightbox-next { right: 25px; }

        .lightbox-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--peach-light);
            font-size: 0.9rem;
            font-weight: 500;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        /* Footer Designer */
        .designer-footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 20px;
            margin-top: 40px;
            background: linear-gradient(180deg, transparent 0%, rgba(139,26,26,0.06) 100%);
        }

        .designer-divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 30px;
        }

        .designer-label {
            font-size: 0.9rem;
            color: var(--red-wine);
            margin-bottom: 10px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .designer-name {
            font-family: 'Amiri', serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 700;
            color: var(--red-deep);
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(139,26,26,0.1);
        }

        .designer-subtitle {
            font-size: 0.85rem;
            color: var(--peach-coral);
            font-weight: 500;
        }

        /* Scroll animations */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header { padding: 40px 15px 30px; }
            .header-details { gap: 10px; }
            .detail-item { padding: 8px 14px; font-size: 0.85rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .color-swatch { width: 50px; height: 50px; }
            .lightbox-nav { width: 40px; height: 40px; font-size: 1.2rem; }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Header -->
    <header class="header">
        <h1>الأميرة نورة بنت مساعد</h1>
        <p class="header-subtitle">✦ حفل زفاف  ✦</p>
        <div class="header-details">
            <div class="detail-item">
                <span class="detail-icon">📍</span>
                <span>قاعة اليمامة</span>
            </div>
            <div class="detail-item">
                <span class="detail-icon">📅</span>
                <span>10 يوليو 2026</span>
            </div>
                    </div>
    </header>

    <!-- Color Palette -->
    <section class="palette-section fade-in">
        <p class="palette-title">لوحة الألوان</p>
        <div class="palette-container">
            <div class="color-swatch" style="background: linear-gradient(135deg, #8B1A1A, #A52A2A);">
                <span class="color-label">أحمر داكن</span>
            </div>
                                   <div class="color-swatch" style="background: linear-gradient(135deg, #FFDAB9, #FFCBA4);">
                <span class="color-label">خوخي ناعم</span>
            </div>
                       
                   </div>
    </section>

    <!-- Gallery -->
    <section class="gallery-section">
        <h2 class="gallery-title fade-in">ألبوم التصاميم</h2>
        <div class="gallery-grid" id="gallery">
            <!-- Images will be loaded here -->
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <button class="lightbox-nav lightbox-prev" onclick="changeImage(-1)">‹</button>
        <img class="lightbox-img" id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="changeImage(1)">›</button>
        <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>

    <!-- Designer Footer -->
    <footer class="designer-footer fade-in">
        <div class="designer-divider"></div>
                <h2 class="designer-name"> المصمم محمد التونسي</h2>
    </footer>

    <script>
        // Image URLs from user
        const imageUrls = [
            "https://i.imgur.com/htyjOks.jpg",
            "https://i.imgur.com/PYEMLRs.jpg",
            "https://i.imgur.com/5PY0AbW.jpg",
            "https://i.imgur.com/DkN844j.jpg",
            "https://i.imgur.com/J0J53il.jpg",
            "https://i.imgur.com/8ahREyJ.jpg",
            "https://i.imgur.com/L3ogDp2.jpg",
            "https://i.imgur.com/acAH6Fx.jpg",
            "https://i.imgur.com/d6ebJz5.jpg",
            "https://i.imgur.com/LD6Bd73.jpg"
        ];

        // Fallback images in case imgur links don't work
        const fallbackImages = [
            { url: "https://images.unsplash.com/photo-1519741497674-611481863552?w=800", alt: "Wedding Aisle" },
            { url: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=800", alt: "Wedding Decor" },
            { url: "https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=800", alt: "Wedding Hall" },
            { url: "https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=800", alt: "Wedding Flowers" },
            { url: "https://images.unsplash.com/photo-1530023367847-a683933f4172?w=800", alt: "Wedding Stage" },
            { url: "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=800", alt: "Wedding Setup" },
            { url: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800", alt: "Wedding Details" },
            { url: "https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800", alt: "Wedding Entrance" },
            { url: "https://images.unsplash.com/photo-1520854221256-17451cc331bf?w=800", alt: "Wedding Table" },
            { url: "https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=800", alt: "Wedding Reception" }
        ];

        let currentImageIndex = 0;
        let loadedImages = [];

        // Create gallery
        const gallery = document.getElementById('gallery');

        imageUrls.forEach((url, index) => {
            const item = document.createElement('div');
            item.className = `gallery-item fade-in ${index === 0 ? 'featured' : ''}`;
            item.style.animationDelay = `${index * 0.1}s`;

            const img = document.createElement('img');
            img.src = url;
            img.alt = `تصميم ${index + 1}`;
            img.loading = "lazy";

            // Handle image load error with fallback
            img.onerror = function() {
                this.src = fallbackImages[index % fallbackImages.length].url;
                this.alt = fallbackImages[index % fallbackImages.length].alt;
            };

            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.innerHTML = '<span class="overlay-text">🔍 اضغط للتكبير</span>';

            item.appendChild(img);
            item.appendChild(overlay);
            item.onclick = () => openLightbox(index);
            gallery.appendChild(item);

            loadedImages.push(url);
        });

        // Lightbox functions
        function openLightbox(index) {
            currentImageIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const counter = document.getElementById('lightbox-counter');

            lightboxImg.src = loadedImages[index];
            counter.textContent = `${index + 1} / ${loadedImages.length}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function changeImage(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = loadedImages.length - 1;
            if (currentImageIndex >= loadedImages.length) currentImageIndex = 0;

            const lightboxImg = document.getElementById('lightbox-img');
            const counter = document.getElementById('lightbox-counter');

            lightboxImg.style.transform = 'scale(0.9)';
            setTimeout(() => {
                lightboxImg.src = loadedImages[currentImageIndex];
                counter.textContent = `${currentImageIndex + 1} / ${loadedImages.length}`;
                lightboxImg.style.transform = 'scale(1)';
            }, 200);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;

            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') changeImage(-1);
            if (e.key === 'ArrowRight') changeImage(1);
        });

        // Close on background click
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#FFDAB9', '#FFA07A', '#F08080', '#D4AF37', '#FFCBA4'];

            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 15 + 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${15 + Math.random() * 15}s`;
                container.appendChild(particle);
            }
        }

        // Scroll animations
        function handleScrollAnimations() {
            const elements = document.querySelectorAll('.fade-in');
            elements.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.85) {
                    el.classList.add('visible');
                }
            });
        }

        // Initialize
        createParticles();
        handleScrollAnimations();
        window.addEventListener('scroll', handleScrollAnimations);

        // Touch swipe for lightbox
        let touchStartX = 0;
        const lightbox = document.getElementById('lightbox');

        lightbox.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        lightbox.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) changeImage(1);
                else changeImage(-1);
            }
        });
    </script>
</body>
</html>
